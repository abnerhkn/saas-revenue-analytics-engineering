version: 2

models:

  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: fact_mrr_monthly
    columns:
      - name: month
        tests:
          - not_null

  - name: fact_revenue_movements
    columns:
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
              
  - name: fct_churn_monthly
    columns:
      - name: month
        tests:
          - not_null