version: 2

models:

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_subscription_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

  - name: stg_invoices
    columns:
      - name: invoice_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null